version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - fx-db:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/fx_analytics.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8080,http://localhost:3000
      - LOG_LEVEL=INFO
    restart: unless-stopped

  # Optional: PostgreSQL (uncomment to use)
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: fx_analytics
  #     POSTGRES_USER: fx
  #     POSTGRES_PASSWORD: fx_secret
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #
  # To use PostgreSQL, set:
  #   DATABASE_URL=postgresql+asyncpg://fx:fx_secret@db:5432/fx_analytics
  # and add `asyncpg` to requirements.txt

volumes:
  fx-db:
  # pg-data:
